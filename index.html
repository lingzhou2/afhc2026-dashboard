<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AFHC 2026 — Internal Programme Dashboard</title>
<style>
  :root {
    --green: #95C97A;
    --green-light: #b5dca0;
    --green-bg: #F6FAF4;
    --dark: #192A3A;
    --accent: #00B7CD;
    --card-bg: #FFFFFF;
    --border: #DCE8D6;
    --body-text: #34495E;
    --muted: #6C7A89;
    --radius: 10px;
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; background: var(--green-bg); color: var(--body-text); line-height: 1.5; }

  .header { background: var(--green); color: #fff; padding: 14px 32px; display: flex; align-items: center; gap: 16px; flex-wrap: wrap; }
  .header h1 { font-size: 20px; font-weight: 700; letter-spacing: .3px; }
  .header-subtitle { font-size: 13px; color: rgba(255,255,255,.85); flex: 1; }
  .header-actions { display: flex; gap: 8px; align-items: center; }
  .btn { padding: 6px 14px; border-radius: 6px; font-size: 12px; font-weight: 600; border: none; cursor: pointer; transition: background .15s; }
  .btn-admin { background: var(--dark); color: #fff; }
  .btn-admin.active { background: #E65100; }
  .btn-admin:hover { opacity: .9; }
  .btn-export { background: rgba(255,255,255,.2); color: #fff; border: 1px solid rgba(255,255,255,.4); }
  .btn-export:hover { background: rgba(255,255,255,.35); }
  .btn-import { background: rgba(255,255,255,.2); color: #fff; border: 1px solid rgba(255,255,255,.4); }
  .btn-import:hover { background: rgba(255,255,255,.35); }
  #importFile { display: none; }

  .filter-bar { background: #fff; border-bottom: 1px solid var(--border); padding: 14px 32px; display: flex; align-items: center; gap: 14px; flex-wrap: wrap; position: sticky; top: 0; z-index: 100; }
  .filter-bar input[type="text"] { flex: 1 1 220px; min-width: 180px; padding: 8px 14px; border: 1px solid var(--border); border-radius: 6px; font-size: 14px; outline: none; }
  .filter-bar input[type="text"]:focus { border-color: var(--accent); }
  .filter-bar select { padding: 8px 12px; border: 1px solid var(--border); border-radius: 6px; font-size: 13px; background: #fff; color: var(--body-text); cursor: pointer; outline: none; }
  .filter-bar select:focus { border-color: var(--accent); }
  .filter-summary { font-size: 13px; color: var(--muted); margin-left: auto; white-space: nowrap; }

  .board { display: flex; gap: 0; overflow-x: auto; padding: 24px 24px 32px; min-height: calc(100vh - 140px); }
  .day-column { flex: 1 0 240px; min-width: 240px; max-width: 320px; display: flex; flex-direction: column; }
  .day-column + .day-column { border-left: 1px solid var(--border); padding-left: 12px; margin-left: 12px; }
  .day-header { color: var(--dark); padding: 8px 6px 12px; display: flex; align-items: flex-start; justify-content: space-between; gap: 8px; }
  .day-header-text { display: flex; flex-direction: column; gap: 2px; }
  .day-date { font-size: 12px; font-weight: 700; letter-spacing: .4px; text-transform: uppercase; color: var(--accent); }
  .day-title { font-size: 14px; font-weight: 700; }
  .day-count { background: var(--accent); color: #fff; font-size: 11px; font-weight: 700; padding: 1px 8px; border-radius: 10px; }
  .cards-list { display: flex; flex-direction: column; gap: 10px; padding-right: 6px; }

  .card { background: var(--card-bg); border: 1px solid var(--border); border-radius: var(--radius); padding: 14px 16px 12px; cursor: pointer; transition: box-shadow .15s, border-color .15s; position: relative; }
  .card:hover { box-shadow: 0 3px 12px rgba(25,42,58,.10); border-color: var(--accent); }
  .card.active { border-color: var(--accent); box-shadow: 0 0 0 2px rgba(0,183,205,.25); }
  .card-break { background: #FAFCF8; border-style: dashed; opacity: .7; }
  .card-break:hover { opacity: 1; }
  .card-title { font-size: 14px; font-weight: 600; color: var(--dark); margin-bottom: 6px; line-height: 1.35; }
  .card-time { font-size: 12px; color: var(--muted); margin-bottom: 2px; }
  .card-venue { font-size: 12px; color: var(--muted); margin-bottom: 2px; }
  .card-lead { font-size: 12px; color: var(--muted); margin-bottom: 8px; }
  .card-tags { display: flex; gap: 6px; flex-wrap: wrap; }
  .tag { font-size: 11px; font-weight: 600; padding: 2px 8px; border-radius: 4px; white-space: nowrap; text-transform: capitalize; }
  .tag-session { background: #E8F5E9; color: #2E7D32; }
  .tag-session-break { background: #ECEFF1; color: #607D8B; }
  .tag-access-open { background: #E8F5E9; color: #388E3C; }
  .tag-access-members_only { background: #E3EDF7; color: #37474F; }
  .tag-access-closed { background: #D5DDE5; color: #455A64; }
  .tag-access-ticketed { background: #FFF3E0; color: #E65100; }
  .tag-access-invitation_only { background: #FFF8E1; color: #F57F17; }
  .tag-access-off_site { background: #E0F7FA; color: #00838F; border: 1px solid #B2EBF2; }
  .card-hidden { display: none; }

  .detail-overlay { display: none; position: fixed; top: 0; right: 0; bottom: 0; left: 0; z-index: 200; }
  .detail-overlay.open { display: flex; }
  .detail-backdrop { position: absolute; top: 0; right: 0; bottom: 0; left: 0; background: rgba(25,42,58,.25); }
  .detail-panel { position: absolute; top: 0; right: 0; width: 520px; max-width: 95vw; height: 100%; background: #fff; box-shadow: -4px 0 24px rgba(25,42,58,.12); overflow-y: auto; padding: 32px 28px 40px; animation: slideIn .18s ease-out; }
  @keyframes slideIn { from { transform: translateX(30px); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
  .detail-close { position: absolute; top: 16px; right: 20px; background: none; border: none; font-size: 22px; color: var(--muted); cursor: pointer; line-height: 1; padding: 4px; }
  .detail-close:hover { color: var(--dark); }
  .detail-day { font-size: 12px; font-weight: 600; color: var(--accent); text-transform: uppercase; letter-spacing: .5px; margin-bottom: 6px; }
  .detail-title { font-size: 20px; font-weight: 700; color: var(--dark); margin-bottom: 16px; line-height: 1.3; padding-right: 36px; }
  .detail-section { margin-bottom: 18px; }
  .detail-label { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: .6px; color: var(--muted); margin-bottom: 4px; }
  .detail-value { font-size: 14px; color: var(--body-text); line-height: 1.5; }
  .detail-tags { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 20px; }
  .detail-divider { border: none; border-top: 1px solid var(--border); margin: 20px 0; }
  .detail-subday { font-size: 16px; font-weight: 700; color: var(--dark); margin-bottom: 14px; }
  .agenda-list { list-style: none; padding: 0; }
  .agenda-item { padding: 10px 0; border-bottom: 1px solid #f0f0f0; }
  .agenda-item:last-child { border-bottom: none; }
  .agenda-item-time { font-size: 12px; color: var(--accent); font-weight: 600; }
  .agenda-item-topic { font-size: 14px; color: var(--dark); font-weight: 600; margin: 2px 0; }
  .agenda-item-speaker { font-size: 13px; color: var(--muted); }
  .agenda-item-desc { font-size: 13px; color: var(--body-text); margin-top: 4px; }
  .edit-form { display: none; }
  .admin-mode .edit-form { display: block; }
  .admin-mode .view-content { display: none; }
  .edit-group { margin-bottom: 14px; }
  .edit-group label { display: block; font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: .5px; color: var(--muted); margin-bottom: 4px; }
  .edit-group input, .edit-group textarea, .edit-group select {
    width: 100%; padding: 8px 10px; border: 1px solid var(--border); border-radius: 6px; font-size: 13px; font-family: inherit; outline: none; transition: border-color .15s;
  }
  .edit-group input:focus, .edit-group textarea:focus, .edit-group select:focus { border-color: var(--accent); }
  .edit-group textarea { resize: vertical; min-height: 60px; }
  .edit-row { display: flex; gap: 10px; }
  .edit-row .edit-group { flex: 1; }
  .agenda-edit-section { margin-top: 20px; padding-top: 16px; border-top: 2px solid var(--accent); }
  .agenda-edit-title { font-size: 14px; font-weight: 700; color: var(--dark); margin-bottom: 12px; display: flex; align-items: center; gap: 8px; }
  .agenda-entry { background: #F8FAF6; border: 1px solid var(--border); border-radius: 8px; padding: 12px; margin-bottom: 10px; position: relative; }
  .agenda-entry-remove { position: absolute; top: 8px; right: 8px; background: none; border: none; color: #ccc; cursor: pointer; font-size: 16px; line-height: 1; }
  .agenda-entry-remove:hover { color: #E65100; }
  .btn-save { background: var(--accent); color: #fff; padding: 10px 24px; font-size: 14px; width: 100%; margin-top: 10px; border-radius: 8px; }
  .btn-save:hover { background: #009DB0; }
  .btn-save:disabled { background: #ccc; cursor: not-allowed; }
  .btn-add-agenda { background: #E8F5E9; color: #2E7D32; padding: 8px 16px; font-size: 12px; border-radius: 6px; border: 1px dashed #A5D6A7; width: 100%; }
  .btn-add-agenda:hover { background: #C8E6C9; }
  .btn-reset { background: #FFF3E0; color: #E65100; padding: 8px 16px; font-size: 12px; border-radius: 6px; border: 1px solid #FFCC80; width: 100%; margin-top: 6px; }
  .btn-reset:hover { background: #FFE0B2; }

  .toast { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%); background: var(--dark); color: #fff; padding: 10px 24px; border-radius: 8px; font-size: 13px; font-weight: 600; z-index: 999; opacity: 0; transition: opacity .3s; pointer-events: none; }
  .toast.show { opacity: 1; }

  .loading-bar { position: fixed; top: 0; left: 0; height: 3px; background: var(--accent); z-index: 999; transition: width .3s; }

  @media (max-width: 900px) {
    .board { flex-direction: column; }
    .day-column { max-width: 100%; }
    .day-column + .day-column { border-left: none; padding-left: 0; margin-left: 0; border-top: 1px solid var(--border); padding-top: 16px; margin-top: 12px; }
  }
</style>
</head>

(function() {
  var REPO_API = 'https://api.github.com/repos/' + GITHUB_OWNER + '/' + GITHUB_REPO + '/contents/' + GITHUB_FILE;
  var RAW_URL = 'https://raw.githubusercontent.com/' + GITHUB_OWNER + '/' + GITHUB_REPO + '/main/' + GITHUB_FILE;
  var adminMode = false;
  var edits = {};
  var fileSha = null;
  var githubToken = localStorage.getItem(GITHUB_TOKEN_KEY) || '';

  function showLoading(pct) { document.getElementById('loadingBar').style.width = pct + '%'; }
  function hideLoading() { setTimeout(function() { showLoading(0); }, 300); }

  function showToast(msg) {
    var t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(function() { t.classList.remove('show'); }, 2500);
  }

  function sameValue(a, b) {
    return JSON.stringify(a === undefined ? null : a) === JSON.stringify(b === undefined ? null : b);
  }

  function apiHeaders(includeJsonContentType) {
    var headers = {
      'Accept': 'application/vnd.github.v3+json'
    };
    if (githubToken) headers['Authorization'] = 'Bearer ' + githubToken;
    if (includeJsonContentType) headers['Content-Type'] = 'application/json';
    return headers;
  }

  function decodeGitHubContent(payload) {
    if (!payload || !payload.content) return {};
    var normalized = payload.content.replace(/\n/g, '');
    return JSON.parse(decodeURIComponent(escape(atob(normalized))));
  }

  function getEvent(ev) {
    var merged = Object.assign({}, ev);
    if (edits[ev.event_id]) Object.assign(merged, edits[ev.event_id]);
    return merged;
  }
  function hasEdits(id) { return edits[id] && Object.keys(edits[id]).length > 0; }

  function loadEditsFromRaw(callback) {
    fetch(RAW_URL + '?t=' + Date.now())
      .then(function(r) {
        if (!r.ok) throw new Error('HTTP ' + r.status);
        return r.json();
      })
      .then(function(data) {
        callback(true, data || {});
      })
      .catch(function() {
        callback(false, {});
      });
  }

  function loadEditsFromApi(callback) {
    fetch(REPO_API + '?t=' + Date.now(), {
      headers: apiHeaders(false)
    })
      .then(function(r) {
        if (!r.ok) throw new Error('HTTP ' + r.status);
        return r.json();
      })
      .then(function(data) {
        callback(true, decodeGitHubContent(data));
      })
      .catch(function() {
        callback(false, {});
      });
  }

  function loadEditsFromGitHub(callback) {
    showLoading(30);
    loadEditsFromApi(function(ok, data) {
      if (ok) {
        edits = data || {};
        showLoading(100);
        hideLoading();
        if (callback) callback();
        return;
      }
      loadEditsFromRaw(function(rawOk, rawData) {
        edits = rawOk ? (rawData || {}) : {};
        showLoading(100);
        hideLoading();
        if (callback) callback();
      });
    });
  }

  function getFileSha(callback) {
    if (!githubToken) { callback(false); return; }
    fetch(REPO_API, {
      headers: apiHeaders(false)
    })
      .then(function(r) {
        if (!r.ok) throw new Error('HTTP ' + r.status);
        return r.json();
      })
      .then(function(data) {
        fileSha = data.sha;
        callback(true);
      })
      .catch(function() { callback(false); });
  }

  function saveEditsToGitHub(callback) {
    if (!githubToken) {
      showToast('Connect a GitHub token first');
      if (callback) callback(false);
      return;
    }
    showLoading(30);
    getFileSha(function(ok) {
      if (!ok) {
        hideLoading();
        showToast('Unable to access edits.json. Check token permissions.');
        if (callback) callback(false);
        return;
      }
      showLoading(60);
      var content = btoa(unescape(encodeURIComponent(JSON.stringify(edits, null, 2))));
      fetch(REPO_API, {
        method: 'PUT',
        headers: apiHeaders(true),
        body: JSON.stringify({
          message: 'Update programme edits',
          content: content,
          sha: fileSha
        })
      })
        .then(function(r) {
          if (!r.ok) {
            return r.json().catch(function() { return {}; }).then(function(errData) {
              var message = errData && errData.message ? errData.message : 'HTTP ' + r.status;
              throw new Error('HTTP ' + r.status + ': ' + message);
            });
          }
          return r.json();
        })
        .then(function(data) {
          fileSha = data.content.sha;
          showLoading(100);
          hideLoading();
          if (callback) callback(true);
        })
        .catch(function(err) {
          showLoading(100);
          hideLoading();
          if (err.message.indexOf('HTTP 403') === 0) {
            showToast('Save failed: GitHub denied write access. Check token scope and repo write permission.');
          } else {
            showToast('Save failed: ' + err.message);
          }
          if (callback) callback(false);
        });
    });
  }

  function verifyRemoteEdits(callback) {
    loadEditsFromApi(function(ok, data) {
      if (ok) {
        callback(true, data || {});
        return;
      }
      loadEditsFromRaw(function(rawOk, rawData) {
        callback(rawOk, rawOk ? (rawData || {}) : null);
      });
    });
  }

  var day_groups = PROGRAMME_DATA.day_groups;
  var baseEvents = PROGRAMME_DATA.events;
  var dayLabelMap = {};
  day_groups.forEach(function(group) { dayLabelMap[group.id] = { date_label: group.date_label, title_label: group.title_label }; });

  function formatLabel(s) { return s.replace(/_/g, ' ').replace(/\b\w/g, function(c) { return c.toUpperCase(); }); }
  function esc(s) { if (!s) return ''; var d = document.createElement('div'); d.textContent = s; return d.innerHTML; }
  function attr(s) { return (s || '').replace(/"/g, '&quot;'); }

  // Filters
  var daySelect = document.getElementById('filterDay');
  var typeSelect = document.getElementById('filterType');
  var venueSelect = document.getElementById('filterVenue');
  var accessSelect = document.getElementById('filterAccess');
  day_groups.forEach(function(g) { var o = document.createElement('option'); o.value = g.id; o.textContent = g.date_label + ' — ' + g.title_label; daySelect.appendChild(o); });
  var sessionTypes = []; baseEvents.forEach(function(e) { if (sessionTypes.indexOf(e.session_type) === -1) sessionTypes.push(e.session_type); }); sessionTypes.sort();
  sessionTypes.forEach(function(t) { var o = document.createElement('option'); o.value = t; o.textContent = formatLabel(t); typeSelect.appendChild(o); });
  var venues = []; baseEvents.forEach(function(e) { if (e.venue && venues.indexOf(e.venue) === -1) venues.push(e.venue); }); venues.sort();
  venues.forEach(function(v) { var o = document.createElement('option'); o.value = v; o.textContent = v; venueSelect.appendChild(o); });
  var accessTypes = []; baseEvents.forEach(function(e) { if (accessTypes.indexOf(e.access_type) === -1) accessTypes.push(e.access_type); }); accessTypes.sort();
  accessTypes.forEach(function(a) { var o = document.createElement('option'); o.value = a; o.textContent = formatLabel(a); accessSelect.appendChild(o); });

  var board = document.getElementById('board');
  function buildBoard() {
    board.innerHTML = '';
    day_groups.forEach(function(group) {
      var col = document.createElement('div');
      col.className = 'day-column';
      col.dataset.day = group.id;
      var dayEvents = baseEvents.filter(function(e) { return e.day_group === group.id; }).sort(function(a, b) { return a.display_order - b.display_order; });
      col.innerHTML = '<div class="day-header"><div class="day-header-text"><div class="day-date">' + group.date_label + '</div><div class="day-title">' + group.title_label + '</div></div><span class="day-count">' + dayEvents.length + '</span></div><div class="cards-list"></div>';
      var list = col.querySelector('.cards-list');
      dayEvents.forEach(function(ev) { list.appendChild(createCard(ev)); });
      board.appendChild(col);
    });
    applyFilters();
  }

  function createCard(baseEv) {
    var ev = getEvent(baseEv);
    var card = document.createElement('div');
    var cls = 'card';
    if (ev.session_type === 'break') cls += ' card-break';
    card.className = cls;
    card.dataset.eventId = baseEv.event_id;
    card.dataset.sessionType = ev.session_type;
    card.dataset.accessType = ev.access_type;
    card.dataset.venue = ev.venue || '';
    card.dataset.dayGroup = ev.day_group;
    card.dataset.search = [ev.title, ev.venue, ev.lead, ev.subtheme, ev.notes].filter(Boolean).join(' ').toLowerCase();
    var html = '<div class="card-title">' + esc(ev.title) + '</div>';
    if (ev.time_label) html += '<div class="card-time">' + esc(ev.time_label) + '</div>';
    if (ev.venue) html += '<div class="card-venue">' + esc(ev.venue) + '</div>';
    if (ev.lead) html += '<div class="card-lead">Lead: ' + esc(ev.lead) + '</div>';
    html += '<div class="card-tags">';
    html += '<span class="' + (ev.session_type === 'break' ? 'tag tag-session-break' : 'tag tag-session') + '">' + formatLabel(ev.session_type) + '</span>';
    if (ev.access_type !== 'open') html += '<span class="tag tag-access-' + ev.access_type + '">' + formatLabel(ev.access_type) + '</span>';
    html += '</div>';
    card.innerHTML = html;
    card.addEventListener('click', function() { openDetail(baseEv); });
    return card;
  }

  var searchBox = document.getElementById('searchBox');
  var filterSummary = document.getElementById('filterSummary');
  function applyFilters() {
    var q = searchBox.value.toLowerCase().trim();
    var fDay = daySelect.value, fType = typeSelect.value, fVenue = venueSelect.value, fAccess = accessSelect.value;
    var visible = 0;
    document.querySelectorAll('.card').forEach(function(card) {
      var show = true;
      if (fDay && card.dataset.dayGroup !== fDay) show = false;
      if (fType && card.dataset.sessionType !== fType) show = false;
      if (fVenue && card.dataset.venue !== fVenue) show = false;
      if (fAccess && card.dataset.accessType !== fAccess) show = false;
      if (q && !card.dataset.search.includes(q)) show = false;
      card.classList.toggle('card-hidden', !show);
      if (show) visible++;
    });
    document.querySelectorAll('.day-column').forEach(function(col) {
      col.querySelector('.day-count').textContent = col.querySelectorAll('.card:not(.card-hidden)').length;
    });
    filterSummary.textContent = visible + ' of ' + baseEvents.length + ' activities';
  }
  searchBox.addEventListener('input', applyFilters);
  [daySelect, typeSelect, venueSelect, accessSelect].forEach(function(el) { el.addEventListener('change', applyFilters); });

  // Detail Panel
  var overlay = document.getElementById('detailOverlay');
  var backdrop = document.getElementById('detailBackdrop');
  var panel = document.getElementById('detailPanel');
  var currentBaseEv = null;

  function openDetail(baseEv) {
    currentBaseEv = baseEv;
    var ev = getEvent(baseEv);
    var detailDay = dayLabelMap[ev.day_group] || { date_label: ev.day_label, title_label: '' };
    document.querySelectorAll('.card.active').forEach(function(c) { c.classList.remove('active'); });
    var ac = document.querySelector('.card[data-event-id="' + baseEv.event_id + '"]');
    if (ac) ac.classList.add('active');
    var html = '<button class="detail-close" id="detailClose">&times;</button>';
    html += '<div class="view-content">';
    html += '<div class="detail-day">' + esc(detailDay.date_label) + '</div>';
    if (detailDay.title_label) html += '<div class="detail-subday">' + esc(detailDay.title_label) + '</div>';
    html += '<div class="detail-title">' + esc(ev.title) + '</div>';
    html += '<div class="detail-tags">';
    html += '<span class="' + (ev.session_type === 'break' ? 'tag tag-session-break' : 'tag tag-session') + '">' + formatLabel(ev.session_type) + '</span>';
    if (ev.access_type !== 'open') html += '<span class="tag tag-access-' + ev.access_type + '">' + formatLabel(ev.access_type) + '</span>';
    html += '</div>';
    if (ev.time_label) html += '<div class="detail-section"><div class="detail-label">Time</div><div class="detail-value">' + esc(ev.time_label) + '</div></div>';
    if (ev.venue) html += '<div class="detail-section"><div class="detail-label">Venue</div><div class="detail-value">' + esc(ev.venue) + '</div></div>';
    if (ev.lead) html += '<div class="detail-section"><div class="detail-label">Lead</div><div class="detail-value">' + esc(ev.lead) + '</div></div>';
    if (ev.subtheme) html += '<div class="detail-section"><div class="detail-label">Sub-theme</div><div class="detail-value">' + esc(ev.subtheme) + '</div></div>';
    if (ev.notes) html += '<div class="detail-section"><div class="detail-label">Programme Details</div><div class="detail-value">' + esc(ev.notes) + '</div></div>';
    else if (ev.summary) html += '<div class="detail-section"><div class="detail-label">Programme Details</div><div class="detail-value">' + esc(ev.summary) + '</div></div>';
    if ((ev.agenda || []).length > 0) {
      html += '<hr class="detail-divider">';
      html += '<div class="detail-label">Sub-sessions</div>';
      html += '<ul class="agenda-list">';
      ev.agenda.forEach(function(a) {
        html += '<li class="agenda-item">';
        if (a.time) html += '<div class="agenda-item-time">' + esc(a.time) + '</div>';
        if (a.topic) html += '<div class="agenda-item-topic">' + esc(a.topic) + '</div>';
        if (a.speaker) html += '<div class="agenda-item-speaker">' + esc(a.speaker) + '</div>';
        if (a.description) html += '<div class="agenda-item-desc">' + esc(a.description) + '</div>';
        html += '</li>';
      });
      html += '</ul>';
    }
    html += '</div>';

    html += '<div class="edit-form">';
    html += '<div class="detail-day">' + esc(detailDay.date_label) + '</div>';
    if (detailDay.title_label) html += '<div class="detail-subday">' + esc(detailDay.title_label) + ' — Edit Mode</div>';
    html += '<div class="edit-group"><label>Title</label><input type="text" id="ef-title" value="' + attr(ev.title) + '"></div>';
    html += '<div class="edit-row">';
    html += '<div class="edit-group"><label>Start Time</label><input type="text" id="ef-start" value="' + attr(ev.start_time) + '" placeholder="HH:MM"></div>';
    html += '<div class="edit-group"><label>End Time</label><input type="text" id="ef-end" value="' + attr(ev.end_time) + '" placeholder="HH:MM"></div>';
    html += '</div>';
    html += '<div class="edit-group"><label>Time Label</label><input type="text" id="ef-timelabel" value="' + attr(ev.time_label) + '"></div>';
    html += '<div class="edit-group"><label>Venue</label><input type="text" id="ef-venue" value="' + attr(ev.venue) + '"></div>';
    html += '<div class="edit-group"><label>Lead</label><input type="text" id="ef-lead" value="' + attr(ev.lead) + '"></div>';
    html += '<div class="edit-group"><label>Sub-theme</label><input type="text" id="ef-subtheme" value="' + attr(ev.subtheme) + '"></div>';
    html += '<div class="edit-group"><label>Summary</label><textarea id="ef-summary">' + esc(ev.summary || '') + '</textarea></div>';
    html += '<div class="edit-group"><label>Programme Details</label><textarea id="ef-notes">' + esc(ev.notes || '') + '</textarea></div>';
    html += '<div class="agenda-edit-section">';
    html += '<div class="agenda-edit-title">Sub-sessions</div>';
    html += '<div id="agendaEntries">';
    (ev.agenda || []).forEach(function(a, i) { html += agendaEntryHTML(a, i); });
    html += '</div>';
    html += '<button class="btn btn-add-agenda" id="btnAddAgenda">+ Add Sub-session</button>';
    html += '</div>';
    html += '<button class="btn btn-save" id="btnSave">Save to GitHub</button>';
    if (hasEdits(baseEv.event_id)) html += '<button class="btn btn-reset" id="btnReset">Reset to Original</button>';
    html += '</div>';

    panel.innerHTML = html;
    panel.className = 'detail-panel' + (adminMode ? ' admin-mode' : '');
    overlay.classList.add('open');
    document.getElementById('detailClose').addEventListener('click', closeDetail);
    if (adminMode) bindEditHandlers(baseEv);
  }

  function agendaEntryHTML(a, idx) {
    return '<div class="agenda-entry" data-idx="' + idx + '">' +
      '<button class="agenda-entry-remove" data-idx="' + idx + '">&times;</button>' +
      '<div class="edit-row"><div class="edit-group"><label>Time</label><input type="text" class="ag-time" value="' + attr(a.time) + '" placeholder="e.g. 14:00-14:20"></div>' +
      '<div class="edit-group"><label>Speaker</label><input type="text" class="ag-speaker" value="' + attr(a.speaker) + '"></div></div>' +
      '<div class="edit-group"><label>Topic</label><input type="text" class="ag-topic" value="' + attr(a.topic) + '"></div>' +
      '<div class="edit-group"><label>Description</label><textarea class="ag-desc" rows="2">' + esc(a.description || '') + '</textarea></div>' +
      '</div>';
  }

  function bindEditHandlers(baseEv) {
    var agendaIdx = (getEvent(baseEv).agenda || []).length;
    document.getElementById('btnAddAgenda').addEventListener('click', function() {
      var container = document.getElementById('agendaEntries');
      var div = document.createElement('div');
      div.innerHTML = agendaEntryHTML({ time: '', speaker: '', topic: '', description: '' }, agendaIdx++);
      var entry = div.firstChild;
      container.appendChild(entry);
      entry.querySelector('.agenda-entry-remove').addEventListener('click', function() { entry.remove(); });
    });
    document.querySelectorAll('.agenda-entry-remove').forEach(function(btn) {
      btn.addEventListener('click', function() { btn.closest('.agenda-entry').remove(); });
    });

    document.getElementById('btnSave').addEventListener('click', function() {
      var saveBtn = document.getElementById('btnSave');
      saveBtn.disabled = true;
      saveBtn.textContent = 'Saving...';

      var changes = {};
      var fields = {
        title: 'ef-title',
        start_time: 'ef-start',
        end_time: 'ef-end',
        time_label: 'ef-timelabel',
        venue: 'ef-venue',
        lead: 'ef-lead',
        subtheme: 'ef-subtheme',
        summary: 'ef-summary',
        notes: 'ef-notes'
      };
      for (var key in fields) {
        var val = document.getElementById(fields[key]).value.trim();
        if (val === '') val = null;
        if (val !== (baseEv[key] || null)) changes[key] = val;
      }

      var agendaItems = [];
      document.querySelectorAll('.agenda-entry').forEach(function(entry) {
        var item = {
          time: entry.querySelector('.ag-time').value.trim() || null,
          speaker: entry.querySelector('.ag-speaker').value.trim() || null,
          topic: entry.querySelector('.ag-topic').value.trim() || null,
          description: entry.querySelector('.ag-desc').value.trim() || null
        };
        if (item.time || item.speaker || item.topic || item.description) agendaItems.push(item);
      });
      if (agendaItems.length > 0) changes.agenda = agendaItems;
      else if ((baseEv.agenda || []).length > 0) changes.agenda = [];

      if (Object.keys(changes).length === 0) {
        saveBtn.disabled = false;
        saveBtn.textContent = 'Save to GitHub';
        showToast('No changes to save');
        return;
      }

      if (Object.keys(changes).length > 0) edits[baseEv.event_id] = Object.assign(edits[baseEv.event_id] || {}, changes);
      if (edits[baseEv.event_id]) {
        var empty = true;
        for (var prop in edits[baseEv.event_id]) {
          if (!sameValue(edits[baseEv.event_id][prop], baseEv[prop])) {
            empty = false;
            break;
          }
        }
        if (empty) delete edits[baseEv.event_id];
      }

      saveEditsToGitHub(function(ok) {
        saveBtn.disabled = false;
        saveBtn.textContent = 'Save to GitHub';
        if (ok) {
          verifyRemoteEdits(function(verified, remoteData) {
            if (!verified) {
              showToast('Saved to GitHub, but could not verify remote update yet');
              buildBoard();
              openDetail(baseEv);
              return;
            }
            edits = remoteData || {};
            var remoteEntry = edits[baseEv.event_id];
            if (remoteEntry || Object.keys(changes).length === 0) {
              showToast('Saved and verified: ' + (getEvent(baseEv).title || baseEv.title));
            } else {
              showToast('Save may not have persisted. Please refresh and check edits.json.');
            }
            buildBoard();
            openDetail(baseEv);
          });
        }
      });
    });

    var resetBtn = document.getElementById('btnReset');
    if (resetBtn) {
      resetBtn.addEventListener('click', function() {
        delete edits[baseEv.event_id];
        saveEditsToGitHub(function(ok) {
          if (ok) {
            buildBoard();
            openDetail(baseEv);
            showToast('Reset: ' + baseEv.title);
          }
        });
      });
    }
  }

  function closeDetail() {
    overlay.classList.remove('open');
    currentBaseEv = null;
    document.querySelectorAll('.card.active').forEach(function(c) { c.classList.remove('active'); });
  }
  backdrop.addEventListener('click', closeDetail);
  document.addEventListener('keydown', function(e) { if (e.key === 'Escape') closeDetail(); });

  function updateAdminButtons() {
    var connectBtn = document.getElementById('btnConnectGitHub');
    var adminBtn = document.getElementById('btnAdmin');
    connectBtn.textContent = githubToken ? 'GitHub Connected' : 'Connect GitHub';
    adminBtn.textContent = adminMode ? 'Admin ON' : 'Admin';
    adminBtn.classList.toggle('active', adminMode);
  }

  document.getElementById('btnConnectGitHub').addEventListener('click', function() {
    var token = window.prompt('Paste a GitHub fine-grained personal access token with Contents: Read and Write access to lingzhou2/afhc2026-dashboard');
    if (!token) return;
    githubToken = token.trim();
    localStorage.setItem(GITHUB_TOKEN_KEY, githubToken);
    updateAdminButtons();
    showToast('GitHub token saved in this browser');
  });

  document.getElementById('btnAdmin').addEventListener('click', function() {
    if (!githubToken) {
      showToast('Connect GitHub first');
      return;
    }
    adminMode = !adminMode;
    updateAdminButtons();
    if (currentBaseEv) openDetail(currentBaseEv);
  });

  updateAdminButtons();
  loadEditsFromGitHub(function() { buildBoard(); });
})();
</script>
</body>
</html>
